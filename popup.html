<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guilt Calculator</title>
  <style>
    :root {
      --accent: #ff6b35;
    }

    body {
      margin: 0;
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #f5f5f7;
    }

    .wrap {
      padding: 18px;
      text-align: center;
    }

    .logo {
      font-size: 32px;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 4px;
      background: linear-gradient(90deg, #ffffff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--accent);
    }

    .tagline {
      font-size: 13px;
      font-style: italic;
      color: #b8b8c8;
      margin: 0 0 14px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 107, 53, 0.3);
      background: rgba(255, 107, 53, 0.12);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.active {
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }

    .dot.inactive {
      background: #777;
    }

    .watermark {
      margin-top: 12px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.25);
    }

    .watermark-link {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
    }

    .watermark-link:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">🍕💀</div>
    <h1>Guilt Calculator</h1>
    <p class="tagline">your food, your consequences bestie 🍕</p>
    <div class="status" id="status">
      <span class="dot inactive" id="dot"></span>
      <span id="statusText">checking...</span>
    </div>
    <div class="watermark">powered by <a href="https://www.revoralabs.in" target="_blank" rel="noopener noreferrer" class="watermark-link">Revora Labs</a></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
